<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Toilradar">
  <meta name="application-name" content="Toilradar">
  <meta property="og:title" content="Toilradar">
  <meta property="og:description" content="近くのトイレをすぐに見つけよう">
  <title>Toilradar</title>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <!-- Google Maps -->
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAobI9Wu7ci3lfrjzdzZQWAcgk5sSA5On0&callback=initMap&language=ja&libraries=places"></script>
  <script>
    window.isNative = !!(window.Capacitor?.isNativePlatform?.());
    window.gm_authFailure = function() {
      document.body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;padding:30px;text-align:center"><div style="font-size:3rem">⚠️</div><div style="font-size:1.1rem;font-weight:700;color:#e53935">Google Maps 認証エラー</div><div style="font-size:0.9rem;color:#666;line-height:1.7">課金アカウントが wanttoilet プロジェクトに<br>リンクされていません。<br><br><a href="https://console.cloud.google.com/billing/linkedaccount?project=wanttoilet" style="color:#1a73e8">Google Cloud Console で確認する →</a></div></div>';
    };
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body, button, input, select, textarea {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --blue: #1a73e8;
      --green: #34a853;
      --orange: #e37400;
      --red: #ea4335;
      --sheet-peek: 110px;
      --sheet-half: 50vh;
      --sheet-full: 88vh;
      --nav-height: 56px;
    }

    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100dvh;
      overflow: hidden;
    }

    #map-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* ===================== フローティングUI ===================== */
    #top-overlay {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: max(12px, var(--safe-top)) 12px 8px;
      z-index: 100;
      pointer-events: none;
    }

    #search-bar {
      display: flex;
      align-items: center;
      background: white;
      border-radius: 14px;
      padding: 10px 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      gap: 8px;
      pointer-events: all;
      margin-bottom: 10px;
    }

    #search-bar .app-title { font-size: 1.1rem; font-weight: 800; color: var(--blue); white-space: nowrap; }
    #search-bar input { flex: 1; border: none; outline: none; font-size: 0.95rem; color: #333; background: transparent; min-width: 0; }
    #search-bar input::placeholder { color: #bbb; }
    #search-bar .si { color: #aaa; font-size: 1rem; }
    .clear-btn { background: #e0e0e0; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 0.7rem; cursor: pointer; display: none; align-items: center; justify-content: center; color: #666; pointer-events: all; }
    .clear-btn.show { display: flex; }

    #filter-chips { display: flex; gap: 6px; overflow-x: auto; pointer-events: all; }
    #filter-chips::-webkit-scrollbar { display: none; }

    .chip {
      background: white;
      border: 2px solid transparent;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      box-shadow: 0 1px 6px rgba(0,0,0,0.15);
      color: #444;
      transition: all 0.15s;
    }
    .chip.active { background: var(--blue); color: white; border-color: var(--blue); }
    .chip:active { transform: scale(0.95); }
    .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; vertical-align:middle; flex-shrink:0; }

    /* ===================== FAB ===================== */
    #fab-group {
      position: fixed;
      right: 14px;
      bottom: calc(var(--sheet-peek) + var(--nav-height) + 16px);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 100;
      transition: bottom 0.35s cubic-bezier(.4,0,.2,1);
    }

    .fab {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      box-shadow: 0 3px 10px rgba(0,0,0,0.25);
      transition: transform 0.15s;
    }
    .fab:active { transform: scale(0.92); }
    #fab-add { background: var(--blue); color: white; font-size: 1.5rem; width: 54px; height: 54px; }
    #fab-locate { background: white; color: #444; }

    #search-area-btn {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      border: none;
      border-radius: 22px;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--blue);
      box-shadow: 0 3px 12px rgba(0,0,0,0.22);
      z-index: 100;
      cursor: pointer;
      display: none;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    #search-area-btn.show { display: flex; }
    #search-area-btn:active { transform: translate(-50%,-50%) scale(0.96); }

    /* ===================== ボトムシート ===================== */
    #bottom-sheet {
      position: fixed;
      left: 0; right: 0;
      bottom: calc(var(--nav-height) + var(--safe-bottom));
      height: var(--sheet-full);
      background: white;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
      z-index: 200;
      transform: translateY(calc(100% - var(--sheet-peek)));
      transition: transform 0.35s cubic-bezier(.4,0,.2,1);
      display: flex;
      flex-direction: column;
      touch-action: none;
    }
    #bottom-sheet.snap-peek  { transform: translateY(calc(100% - var(--sheet-peek))); }
    #bottom-sheet.snap-half  { transform: translateY(calc(100% - var(--sheet-half))); }
    #bottom-sheet.snap-full  { transform: translateY(calc(100% - var(--sheet-full))); }
    #bottom-sheet.no-tr { transition: none; }

    #sheet-header { flex-shrink: 0; padding: 10px 16px 8px; cursor: grab; }
    #sheet-header:active { cursor: grabbing; }
    #sheet-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 10px; }
    #sheet-title-row { display: flex; align-items: center; justify-content: space-between; }
    #sheet-count { font-size: 0.95rem; font-weight: 700; color: #222; }
    #sheet-count span { color: var(--blue); }

    #sync-indicator { font-size: 0.75rem; display: flex; align-items: center; gap: 4px; color: #888; }
    #sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; transition: background 0.3s; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    #sheet-list { flex: 1; overflow-y: auto; padding: 4px 12px 16px; -webkit-overflow-scrolling: touch; }
    #sheet-list::-webkit-scrollbar { display: none; }

    .toilet-card {
      background: white;
      border: 1.5px solid #f0f0f0;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      position: relative;
    }
    .toilet-card:active { background: #f8f9ff; transform: scale(0.99); }
    .toilet-card.selected { border-color: var(--blue); background: #f0f6ff; box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }

    .card-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; }
    .card-body { flex: 1; min-width: 0; }
    .card-name { font-size: 0.97rem; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-by { font-size: 0.75rem; color: #aaa; margin-bottom: 2px; }
    .card-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
    .type-badge { font-size: 0.72rem; font-weight: 700; padding: 2px 7px; border-radius: 10px; color: white; }
    .card-rating { font-size: 0.82rem; color: #f4b400; font-weight: 700; }
    .card-rating .nr { color: #bbb; font-weight: 400; }
    .card-amenities { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .amenity-tag { font-size: 0.72rem; background: #f1f3f4; color: #555; padding: 2px 7px; border-radius: 8px; }
    .card-notes { font-size: 0.8rem; color: #888; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-edit-btn { background: none; border: 1.5px solid #ddd; border-radius: 10px; padding: 6px 10px; font-size: 0.8rem; color: #666; cursor: pointer; flex-shrink: 0; align-self: center; }
    .card-edit-btn:active { background: #f0f0f0; }
    .card-action-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
    .card-fav-btn { background: none; border: none; cursor: pointer; padding: 4px; font-size: 1.1rem; color: #ccc; transition: color 0.15s; }
    .card-fav-btn.favorited { color: #ea4335; }
    .card-comment-btn { background: none; border: none; cursor: pointer; padding: 4px; font-size: 1.1rem; color: #aaa; transition: color 0.15s; display: flex; align-items: center; gap: 3px; font-size: 0.78rem; }
    .card-comment-btn:active { color: var(--blue); }

    #empty-state { display: none; flex-direction: column; align-items: center; padding: 40px 20px; color: #bbb; text-align: center; gap: 8px; }
    #empty-state .ei { font-size: 3rem; }
    #empty-state .et { font-size: 1rem; font-weight: 600; color: #aaa; }
    #empty-state .es { font-size: 0.85rem; }

    #loading-state { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 8px; }
    .loading-spinner { width: 36px; height: 36px; border: 3px solid #f0f0f0; border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===================== モーダル ===================== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 600px;
      max-height: 92dvh;
      overflow-y: auto;
      box-shadow: 0 -4px 30px rgba(0,0,0,0.2);
      padding-bottom: var(--safe-bottom);
    }
    .modal-handle-bar { display: flex; justify-content: center; padding: 10px 0 6px; }
    .modal-handle-bar div { width: 40px; height: 4px; background: #ddd; border-radius: 2px; }
    .modal-header { padding: 4px 20px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f0f0f0; }
    .modal-header h2 { font-size: 1.05rem; font-weight: 700; color: #222; }
    .modal-close { background: #f1f1f1; border: none; font-size: 1rem; cursor: pointer; color: #666; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

    .modal-body { padding: 18px 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.82rem; font-weight: 700; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.03em; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 11px 14px; border: 1.5px solid #e8e8e8; border-radius: 10px;
      font-size: 0.95rem; outline: none; transition: border-color 0.2s; font-family: inherit; background: #fafafa;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--blue); background: white; }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .stars { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 4px; }
    .stars input { display: none; }
    .stars label { font-size: 1.8rem; cursor: pointer; color: #e0e0e0; transition: color 0.1s; }
    .stars input:checked ~ label { color: #f4b400; }
    .stars label:hover, .stars label:hover ~ label { color: #f4b400; }

    .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .checkbox-group label { display: flex; align-items: center; gap: 5px; background: #f4f4f4; padding: 7px 12px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; font-weight: 500; color: #444; border: 2px solid transparent; transition: all 0.15s; }
    .checkbox-group input[type=checkbox] { display: none; }
    .checkbox-group label:has(input:checked) { background: #e8f0fe; color: var(--blue); border-color: var(--blue); }

    .coords-display { font-size: 0.8rem; color: #999; margin-bottom: 14px; padding: 8px 12px; background: #f8f8f8; border-radius: 8px; }

    .modal-footer { padding: 12px 20px 16px; border-top: 1px solid #f0f0f0; display: flex; gap: 10px; }
    .btn { padding: 12px 20px; border-radius: 12px; border: none; cursor: pointer; font-size: 0.92rem; font-weight: 700; transition: all 0.15s; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--blue); color: white; flex: 1; }
    .btn-secondary { background: #f1f3f4; color: #333; }
    .btn-danger { background: #fdecea; color: var(--red); margin-right: auto; }

    /* ===================== トースト ===================== */
    #toast {
      position: fixed;
      bottom: calc(var(--sheet-peek) + var(--nav-height) + 16px);
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: white;
      padding: 10px 20px;
      border-radius: 22px;
      font-size: 0.88rem;
      font-weight: 600;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    .poi-register-popup { padding: 6px 2px; text-align: center; }
    .poi-register-popup .poi-label { font-size: 0.82rem; color: #666; margin-bottom: 8px; }
    .poi-register-btn {
      background: #1a73e8; color: white; border: none; border-radius: 10px;
      padding: 9px 18px; font-size: 0.9rem; cursor: pointer; font-weight: 700;
      white-space: nowrap;
    }
    .poi-register-btn:active { opacity: 0.85; }

    /* 文字数カウンター */
    .char-counter { font-size: 0.75rem; color: #aaa; text-align: right; margin-top: 3px; }
    .char-counter.warn { color: #e37400; }
    .char-counter.over  { color: #ea4335; font-weight: 700; }

    /* 通報ボタン */
    .card-report-btn {
      position: absolute; top: 8px; right: 56px;
      background: none; border: none; font-size: 0.75rem; color: #ccc;
      cursor: pointer; padding: 4px 6px; border-radius: 6px;
      transition: color 0.15s;
    }
    .card-report-btn:active { color: #ea4335; }

    /* ローディング画面 */
    #splash {
      position: fixed; inset: 0; z-index: 10000;
      background: #1a73e8;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #splash.hidden { opacity: 0; visibility: hidden; }

    .splash-scene {
      margin-bottom: 28px;
      filter: drop-shadow(0 4px 18px rgba(0,0,0,0.22));
    }
    .splash-title {
      font-size: 1.6rem; font-weight: 800; color: white;
      letter-spacing: 0.04em; margin-bottom: 10px;
    }
    .splash-subtitle {
      font-size: 0.9rem; color: rgba(255,255,255,0.75);
      letter-spacing: 0.06em;
      animation: blink-text 1.4s ease-in-out infinite;
    }
    @keyframes blink-text {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ===================== ボトムナビ ===================== */
    #bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(var(--nav-height) + var(--safe-bottom));
      background: white;
      border-top: 1px solid #e8e8e8;
      display: flex;
      z-index: 300;
      padding-bottom: var(--safe-bottom);
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: #aaa;
      font-size: 0.65rem;
      font-weight: 600;
      gap: 3px;
      padding: 6px 0;
      transition: color 0.15s;
    }
    .nav-btn.active { color: var(--blue); }
    .nav-btn svg { width: 22px; height: 22px; }

    /* ===================== ページオーバーレイ ===================== */
    .page-overlay {
      position: fixed;
      top: 0; left: 0; right: 0;
      bottom: calc(var(--nav-height) + var(--safe-bottom));
      background: #f8f9fa;
      z-index: 250;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .page-overlay.active { display: flex; }

    .page-header {
      background: white;
      padding: max(16px, var(--safe-top)) 20px 14px;
      border-bottom: 1px solid #f0f0f0;
      flex-shrink: 0;
    }
    .page-header h1 { font-size: 1.2rem; font-weight: 800; color: #1a1a1a; }

    .page-content { flex: 1; overflow-y: auto; padding: 12px; -webkit-overflow-scrolling: touch; }
    .page-content::-webkit-scrollbar { display: none; }

    /* ===================== 認証オーバーレイ ===================== */
    #auth-overlay {
      position: fixed;
      inset: 0;
      background: white;
      z-index: 9000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-y: auto;
      padding: max(40px, var(--safe-top)) 24px max(24px, var(--safe-bottom));
    }
    #auth-overlay.active { display: flex; }

    .auth-logo { font-size: 2.2rem; font-weight: 900; color: var(--blue); margin-bottom: 6px; }
    .auth-tagline { font-size: 0.9rem; color: #888; margin-bottom: 32px; }

    .auth-tabs { display: flex; width: 100%; max-width: 360px; background: #f1f3f4; border-radius: 12px; padding: 3px; margin-bottom: 24px; }
    .auth-tab { flex: 1; padding: 9px; border: none; background: none; border-radius: 10px; font-size: 0.9rem; font-weight: 700; color: #888; cursor: pointer; transition: all 0.2s; }
    .auth-tab.active { background: white; color: var(--blue); box-shadow: 0 1px 4px rgba(0,0,0,0.12); }

    .auth-form { width: 100%; max-width: 360px; display: none; flex-direction: column; gap: 14px; }
    .auth-form.active { display: flex; }

    .auth-input {
      width: 100%; padding: 13px 16px; border: 1.5px solid #e8e8e8; border-radius: 12px;
      font-size: 0.97rem; outline: none; transition: border-color 0.2s; font-family: inherit; background: #fafafa;
    }
    .auth-input:focus { border-color: var(--blue); background: white; }

    .auth-btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700;
      background: var(--blue); color: white; cursor: pointer; transition: opacity 0.15s;
    }
    .auth-btn:active { opacity: 0.85; }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-error { color: var(--red); font-size: 0.85rem; background: #fdecea; padding: 10px 14px; border-radius: 10px; display: none; }
    .auth-error.show { display: block; }

    .terms-check-row { display: flex; align-items: flex-start; gap: 10px; font-size: 0.83rem; color: #555; line-height: 1.5; }
    .terms-check-row input[type=checkbox] { width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; cursor: pointer; accent-color: var(--blue); }

    /* ===================== プロフィール設定モーダル ===================== */
    #profile-modal .modal {
      border-radius: 20px 20px 0 0;
    }
    .avatar-upload-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .avatar-preview {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--blue);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 700; color: white;
      overflow: hidden; cursor: pointer; border: 3px solid #e8e8e8;
    }
    .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-upload-btn { font-size: 0.83rem; color: var(--blue); background: #e8f0fe; border: none; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-weight: 600; }

    /* ===================== アバター丸 ===================== */
    .avatar-circle {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--blue);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 700; color: white;
      overflow: hidden; flex-shrink: 0;
    }
    .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-circle.sm { width: 36px; height: 36px; font-size: 0.95rem; }
    .avatar-circle.xs { width: 28px; height: 28px; font-size: 0.75rem; }

    /* ===================== ランキング ===================== */
    .rank-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: white;
      border-radius: 14px;
      margin-bottom: 8px;
    }
    .rank-num { width: 28px; text-align: center; font-size: 1rem; font-weight: 900; color: #bbb; flex-shrink: 0; }
    .rank-num.gold { color: #f4b400; }
    .rank-num.silver { color: #9e9e9e; }
    .rank-num.bronze { color: #c88935; }
    .rank-info { flex: 1; min-width: 0; }
    .rank-name { font-size: 0.95rem; font-weight: 700; color: #222; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rank-pts { font-size: 0.82rem; color: #888; }
    .rank-pts strong { color: var(--blue); font-size: 1rem; }

    /* ===================== お気に入り ===================== */
    .fav-empty { display: flex; flex-direction: column; align-items: center; padding: 60px 20px; gap: 12px; color: #bbb; text-align: center; }
    .fav-empty-icon { font-size: 3rem; }

    /* ===================== コメントモーダル ===================== */
    #comments-modal .modal { border-radius: 20px 20px 0 0; max-height: 80dvh; }
    .comment-creator-row { font-size: 0.82rem; color: #888; padding: 8px 20px; border-bottom: 1px solid #f5f5f5; }
    .comment-list { padding: 10px 16px; display: flex; flex-direction: column; gap: 10px; min-height: 80px; max-height: 280px; overflow-y: auto; }
    .comment-item { display: flex; gap: 10px; align-items: flex-start; }
    .comment-body { flex: 1; background: #f8f9fa; border-radius: 12px; padding: 10px 12px; }
    .comment-author { font-size: 0.78rem; font-weight: 700; color: #333; margin-bottom: 3px; }
    .comment-text { font-size: 0.88rem; color: #444; line-height: 1.5; }
    .comment-time { font-size: 0.72rem; color: #bbb; margin-top: 4px; }
    .comment-del-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 0.75rem; padding: 2px 4px; border-radius: 4px; align-self: flex-start; flex-shrink: 0; margin-top: 10px; }
    .comment-del-btn:active { color: var(--red); }
    .comment-input-row { padding: 10px 16px; border-top: 1px solid #f0f0f0; display: flex; gap: 8px; align-items: flex-end; }
    .comment-input-row textarea { flex: 1; border: 1.5px solid #e8e8e8; border-radius: 10px; padding: 10px 12px; font-size: 0.9rem; resize: none; outline: none; font-family: inherit; max-height: 100px; }
    .comment-input-row textarea:focus { border-color: var(--blue); }
    .comment-send-btn { background: var(--blue); color: white; border: none; border-radius: 10px; padding: 10px 16px; cursor: pointer; font-weight: 700; font-size: 0.88rem; white-space: nowrap; }
    .comment-send-btn:disabled { opacity: 0.5; }

    /* ===================== プロフィールページ ===================== */
    .profile-hero { background: white; padding: 28px 20px 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; border-bottom: 1px solid #f0f0f0; }
    .profile-hero .avatar-circle { width: 80px; height: 80px; font-size: 2rem; }
    .profile-hero-name { font-size: 1.2rem; font-weight: 800; color: #1a1a1a; }
    .profile-hero-sub { font-size: 0.85rem; color: #888; }
    .profile-stats { display: flex; gap: 24px; margin-top: 8px; }
    .profile-stat { text-align: center; }
    .profile-stat-num { font-size: 1.4rem; font-weight: 900; color: var(--blue); }
    .profile-stat-label { font-size: 0.75rem; color: #888; }
    .profile-actions { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .profile-action-btn { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: white; border: none; border-radius: 14px; font-size: 0.95rem; font-weight: 600; cursor: pointer; color: #333; width: 100%; text-align: left; }
    .profile-action-btn .icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
    .profile-action-btn.danger { color: var(--red); }
    .profile-action-btn.danger .icon { background: #fdecea; }
    .profile-action-btn .icon.blue { background: #e8f0fe; }
  </style>
</head>
<body>

<!-- ローディング画面 -->
<div id="splash">
  <div class="splash-scene">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 0 330 115" width="300" height="105">

      <line x1="-30" y1="102" x2="300" y2="102" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

      <g>
        <animateTransform attributeName="transform" type="translate"
          values="-30,0; 148,0"
          keyTimes="0; 1"
          calcMode="spline"
          keySplines="0.4,0,0.15,1"
          dur="2s" repeatCount="1" fill="freeze"/>
        <circle cx="22" cy="19" r="17" fill="white"/>
        <path d="M22 2 Q24 -3 26 1" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
        <circle cx="30" cy="16" r="3.5" fill="#1a73e8"/>
        <circle cx="31.2" cy="14.8" r="1.3" fill="white"/>

        <ellipse cx="34" cy="21" rx="4" ry="2.5" fill="rgba(255,150,150,0.35)"/>
        <path d="M40 6 Q42 3 44 6 Q44 9.5 42 9.5 Q40 9.5 40 6" fill="#8ab4f8"/>

        <path d="M10 47 Q4 53 2 60" fill="none" stroke="white" stroke-width="6" stroke-linecap="round">
          <animateTransform attributeName="transform" type="rotate"
            values="-22,10,47; 22,10,47; -22,10,47" dur="0.34s" repeatCount="indefinite"/>
        </path>
        <path d="M33 47 Q39 53 41 60" fill="none" stroke="white" stroke-width="6" stroke-linecap="round">
          <animateTransform attributeName="transform" type="rotate"
            values="22,33,47; -22,33,47; 22,33,47" dur="0.34s" repeatCount="indefinite"/>
        </path>
        <path d="M16 69 Q11 80 10 91" fill="none" stroke="white" stroke-width="7" stroke-linecap="round">
          <animateTransform attributeName="transform" type="rotate"
            values="-28,16,69; 28,16,69; -28,16,69" dur="0.34s" repeatCount="indefinite"/>
        </path>
        <path d="M28 69 Q33 80 34 91" fill="none" stroke="white" stroke-width="7" stroke-linecap="round">
          <animateTransform attributeName="transform" type="rotate"
            values="28,28,69; -28,28,69; 28,28,69" dur="0.34s" repeatCount="indefinite"/>
        </path>
      </g>
      <!-- ===== トイレ便器（右端・固定） ===== -->
      <g transform="translate(205, 7)">
        <rect x="3" y="0" width="56" height="9" rx="4.5" fill="white"/>
        <rect x="7" y="9" width="48" height="27" rx="6" fill="white"/>
        <rect x="19" y="15" width="22" height="9" rx="4.5" fill="#c5dafc"/>
        <path d="M10 36 L52 36 L56 46 L6 46 Z" fill="white"/>
        <ellipse cx="31" cy="67" rx="29" ry="14.5" fill="white"/>
        <ellipse cx="31" cy="68" rx="22" ry="11" fill="#5b9cf6"/>
        <ellipse cx="24" cy="64" rx="7.5" ry="2.8" fill="white" opacity="0.28"/>
        <rect x="14" y="79" width="34" height="8" rx="4" fill="white"/>
        <rect x="7" y="87" width="48" height="7" rx="3.5" fill="white"/>
      </g>
    </svg>
  </div>
  <div class="splash-title">Toilradar</div>
  <div class="splash-subtitle">トイレを探しています...</div>
</div>

<div id="map-container"></div>

<!-- ===================== フローティングUI ===================== -->
<div id="top-overlay">
  <div id="search-bar">
    <span class="app-title">WC</span>
    <svg class="si" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search-input" placeholder="トイレを検索...">
    <button class="clear-btn" id="clear-search" onclick="clearSearch()">×</button>
  </div>
  <div id="filter-chips">
    <button class="chip active" onclick="setTypeFilter(this,'all')">すべて</button>
    <button class="chip" onclick="setTypeFilter(this,'男女共用')"><span class="dot" style="background:#1a73e8"></span>男女共用</button>
    <button class="chip" onclick="setTypeFilter(this,'男女別')"><span class="dot" style="background:#34a853"></span>男女別</button>
    <button class="chip" onclick="setTypeFilter(this,'多目的')"><span class="dot" style="background:#e37400"></span>多目的</button>
    <button class="chip" onclick="setRatingFilter(this,4)">★ 4以上</button>
    <button class="chip" onclick="setRatingFilter(this,3)">★ 3以上</button>
    <button class="chip" onclick="toggleAmenityFilter(this,'washlet')">ウォシュレット</button>
    <button class="chip" onclick="toggleAmenityFilter(this,'accessible')">車椅子対応</button>
    <button class="chip" onclick="toggleAmenityFilter(this,'babyChange')">おむつ替え</button>
    <button class="chip" onclick="toggleAmenityFilter(this,'h24')">24時間</button>
  </div>
</div>

<button id="search-area-btn" onclick="searchInArea()">この範囲で検索</button>

<div id="fab-group">
  <button class="fab" id="fab-locate" onclick="goToCurrentLocation()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8" stroke-dasharray="2 2"/></svg></button>
  <button class="fab" id="fab-add" onclick="openAddModal(null)">＋</button>
</div>

<!-- ===================== ボトムシート ===================== -->
<div id="bottom-sheet" class="snap-peek">
  <div id="sheet-header">
    <div id="sheet-handle"></div>
    <div id="sheet-title-row">
      <div id="sheet-count"><span id="sheet-count-num">0</span>件のトイレ</div>
      <div id="sync-indicator">
        <div id="sync-dot"></div>
        <span id="sync-label">接続中...</span>
      </div>
    </div>
  </div>
  <div id="sheet-list">
    <div id="loading-state">
      <div class="loading-spinner"></div>
      <div style="color:#aaa;font-size:0.9rem">読み込み中...</div>
    </div>
    <div id="empty-state">
      <div class="ei"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4h10l1 8H6L7 4z"/><path d="M6 12c0 3.3 2.7 6 6 6s6-2.7 6-6"/><line x1="12" y1="18" x2="12" y2="21"/><line x1="9" y1="21" x2="15" y2="21"/></svg></div>
      <div class="et">この付近にトイレがありません</div>
      <div class="es">「＋」ボタンで追加しましょう</div>
    </div>
  </div>
</div>

<!-- ===================== ボトムナビ ===================== -->
<nav id="bottom-nav">
  <button class="nav-btn active" id="nav-map" onclick="showPage('map')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
    マップ
  </button>
  <button class="nav-btn" id="nav-favorites" onclick="showPage('favorites')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    お気に入り
  </button>
  <button class="nav-btn" id="nav-ranking" onclick="showPage('ranking')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    ランキング
  </button>
  <button class="nav-btn" id="nav-profile" onclick="showPage('profile')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    プロフィール
  </button>
</nav>

<!-- ===================== お気に入りページ ===================== -->
<div class="page-overlay" id="favorites-page">
  <div class="page-header">
    <h1>お気に入り</h1>
  </div>
  <div class="page-content" id="favorites-content">
    <div class="fav-empty" id="fav-empty">
      <div class="fav-empty-icon">🤍</div>
      <div style="font-size:1rem;font-weight:700;color:#aaa">お気に入りがありません</div>
      <div style="font-size:0.85rem;color:#bbb">トイレカードのハートボタンで追加できます</div>
    </div>
  </div>
</div>

<!-- ===================== ランキングページ ===================== -->
<div class="page-overlay" id="ranking-page">
  <div class="page-header">
    <h1>ランキング</h1>
  </div>
  <div class="page-content" id="ranking-content">
    <div style="display:flex;align-items:center;justify-content:center;padding:40px;color:#bbb">
      <div class="loading-spinner"></div>
    </div>
  </div>
</div>

<!-- ===================== プロフィールページ ===================== -->
<div class="page-overlay" id="profile-page">
  <div id="profile-page-content" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;">
    <!-- JS で描画 -->
  </div>
</div>

<!-- ===================== 追加/編集モーダル ===================== -->
<div class="modal-overlay" id="toilet-modal">
  <div class="modal">
    <div class="modal-handle-bar"><div></div></div>
    <div class="modal-header">
      <h2 id="modal-title">トイレを追加</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="modal-coords" class="coords-display"></div>
      <div class="form-group" id="place-search-group">
        <label>店舗・場所を検索</label>
        <input type="text" id="f-place-search" placeholder="例: スターバックス 渋谷" autocomplete="off">
      </div>
      <div class="form-group">
        <label>名前・場所名 <span style="color:var(--red)">*</span></label>
        <input type="text" id="f-name" placeholder="例: ○○公園 公衆トイレ" maxlength="50" oninput="updateCounter('f-name',50)">
        <div class="char-counter" id="counter-f-name">0 / 50</div>
      </div>
      <div class="form-group">
        <label>種別</label>
        <select id="f-type">
          <option value="男女共用">男女共用</option>
          <option value="男女別">男女別</option>
          <option value="多目的">多目的</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>利用条件</label>
        <select id="f-access">
          <option value="誰でも利用可">誰でも利用可</option>
          <option value="店舗利用者のみ">店舗利用者のみ</option>
          <option value="施設利用者のみ">施設利用者のみ</option>
          <option value="会員・宿泊者のみ">会員・宿泊者のみ</option>
          <option value="購入者のみ">購入者のみ</option>
          <option value="不明">不明</option>
        </select>
      </div>
      <div class="form-group">
        <label>清潔さ</label>
        <div class="stars">
          <input type="radio" name="f-rating" id="r5" value="5"><label for="r5">★</label>
          <input type="radio" name="f-rating" id="r4" value="4"><label for="r4">★</label>
          <input type="radio" name="f-rating" id="r3" value="3"><label for="r3">★</label>
          <input type="radio" name="f-rating" id="r2" value="2"><label for="r2">★</label>
          <input type="radio" name="f-rating" id="r1" value="1"><label for="r1">★</label>
        </div>
      </div>
      <div class="form-group">
        <label>設備</label>
        <div class="checkbox-group">
          <label><input type="checkbox" id="f-washlet">ウォシュレット</label>
          <label><input type="checkbox" id="f-accessible">車椅子対応</label>
          <label><input type="checkbox" id="f-babyChange">おむつ替え</label>
          <label><input type="checkbox" id="f-24h">24時間利用可</label>
          <label><input type="checkbox" id="f-paid">有料</label>
        </div>
      </div>
      <div class="form-group">
        <label>メモ</label>
        <textarea id="f-notes" placeholder="特記事項など（任意）" maxlength="200" oninput="updateCounter('f-notes',200)"></textarea>
        <div class="char-counter" id="counter-f-notes">0 / 200</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="btn-delete" style="display:none" onclick="deleteToilet()">削除</button>
      <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveToilet()">保存</button>
    </div>
  </div>
</div>

<!-- ===================== 認証オーバーレイ ===================== -->
<div id="auth-overlay">
  <div class="auth-logo">WC</div>
  <div class="auth-tagline">近くのトイレをすぐに見つけよう</div>
  <div class="auth-tabs">
    <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">ログイン</button>
    <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">新規登録</button>
  </div>

  <!-- ログインフォーム -->
  <form class="auth-form active" id="login-form" onsubmit="handleLogin(event)">
    <div id="login-error" class="auth-error"></div>
    <input class="auth-input" type="email" id="login-email" placeholder="メールアドレス" autocomplete="email" required>
    <input class="auth-input" type="password" id="login-password" placeholder="パスワード" autocomplete="current-password" required>
    <button class="auth-btn" type="submit" id="login-btn">ログイン</button>
  </form>

  <!-- 新規登録フォーム -->
  <form class="auth-form" id="register-form" onsubmit="handleRegister(event)">
    <div id="register-error" class="auth-error"></div>
    <input class="auth-input" type="email" id="register-email" placeholder="メールアドレス" autocomplete="email" required>
    <input class="auth-input" type="password" id="register-password" placeholder="パスワード（6文字以上）" autocomplete="new-password" minlength="6" required>
    <label class="terms-check-row">
      <input type="checkbox" id="terms-check" required>
      <span>利用規約に同意します。本アプリはトイレ情報の共有のみを目的とし、出会い・わいせつ・盗撮などの違反行為は禁止されています。</span>
    </label>
    <button class="auth-btn" type="submit" id="register-btn">アカウントを作成</button>
  </form>
</div>

<!-- ===================== プロフィール設定モーダル ===================== -->
<div class="modal-overlay" id="profile-modal">
  <div class="modal">
    <div class="modal-handle-bar"><div></div></div>
    <div class="modal-header">
      <h2 id="profile-modal-title">プロフィール設定</h2>
      <button class="modal-close" id="profile-modal-close-btn" onclick="closeProfileModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>アバター</label>
        <div class="avatar-upload-area">
          <div class="avatar-preview" id="avatar-preview-circle" onclick="document.getElementById('avatar-file-input').click()">
            <span id="avatar-preview-initial">?</span>
          </div>
          <button type="button" class="avatar-upload-btn" onclick="document.getElementById('avatar-file-input').click()">画像を選択</button>
          <input type="file" id="avatar-file-input" accept="image/*" style="display:none" onchange="onAvatarFileChange(event)">
        </div>
      </div>
      <div class="form-group">
        <label>ユーザー名 <span style="color:var(--red)">*</span></label>
        <input type="text" id="pf-username" placeholder="例: トイレマスター" maxlength="20">
      </div>
      <div class="form-group">
        <label>性別</label>
        <select id="pf-gender">
          <option value="">選択しない</option>
          <option value="男性">男性</option>
          <option value="女性">女性</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>年齢</label>
        <input type="number" id="pf-age" placeholder="例: 25" min="1" max="120">
      </div>
      <div class="form-group">
        <label>職業</label>
        <input type="text" id="pf-occupation" placeholder="例: エンジニア" maxlength="30">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveProfile()">保存</button>
    </div>
  </div>
</div>

<!-- ===================== コメントモーダル ===================== -->
<div class="modal-overlay" id="comments-modal">
  <div class="modal">
    <div class="modal-handle-bar"><div></div></div>
    <div class="modal-header">
      <h2 id="comments-modal-title">コメント</h2>
      <button class="modal-close" onclick="closeCommentsModal()">×</button>
    </div>
    <div class="comment-creator-row" id="comments-creator-row"></div>
    <div class="comment-list" id="comment-list">
      <div style="text-align:center;color:#bbb;font-size:0.88rem;padding:20px">コメントはまだありません</div>
    </div>
    <div class="comment-input-row" id="comment-input-row">
      <textarea id="comment-text-input" placeholder="コメントを入力 (150文字以内)" maxlength="150" rows="2" oninput="updateCommentCounter()"></textarea>

function resizeImageToBase64(file, size = 100) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const min = Math.min(img.width, img.height);
      const sx = (img.width - min) / 2;
      const sy = (img.height - min) / 2;
      ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg', 0.8));
    };
    img.onerror = reject;
    img.src = url;
  });
}

  }

  // 自分が登録したトイレ一覧
  const myList = document.getElementById('my-toilets-list');
  if (myList) {
    const myToilets = toilets.filter(t => t.createdBy === currentUser.uid);
    if (myToilets.length === 0) {
      myList.innerHTML = '<div style="text-align:center;color:#bbb;font-size:0.88rem;padding:24px 0">まだトイレを登録していません</div>';
    } else {
      myList.innerHTML = '';
      myToilets.forEach(t => myList.appendChild(buildCard(t)));
    }
  }
}

function buildAvatarCircle(avatarBase64, username, size) {
  const sizeClass = size === 'sm' ? ' sm' : size === 'xs' ? ' xs' : '';
  if (avatarBase64) {
    return `<div class="avatar-circle${sizeClass}"><img src="${avatarBase64}" alt="${esc(username||'')}"></div>`;
  }
  const initial = (username || '?').charAt(0).toUpperCase();
  return `<div class="avatar-circle${sizeClass}">${initial}</div>`;
}

window.initMap = function() {
  map = new google.maps.Map(document.getElementById('map-container'), {
    center: { lat: 35.6812, lng: 139.7671 },
    zoom: 14,
    disableDefaultUI: true,
    zoomControl: true,
    zoomControlOptions: { position: google.maps.ControlPosition.LEFT_BOTTOM },
    gestureHandling: 'greedy',
  });

  poiInfoWindow = new google.maps.InfoWindow();

  map.addListener('click', e => {
    hideSearchAreaBtn();
    poiInfoWindow.close();

    if (e.placeId) {
      e.stop();
      poiInfoWindow.setPosition(e.latLng);
      poiInfoWindow.setContent(
        '<div class="poi-register-popup">' +
        '<div class="poi-label">この場所のトイレ情報を登録</div>' +
        '<button class="poi-register-btn" id="poi-reg-btn">＋ トイレを登録</button>' +
        '</div>'
      );
      poiInfoWindow.open(map);
      google.maps.event.addListenerOnce(poiInfoWindow, 'domready', () => {
        const btn = document.getElementById('poi-reg-btn');
        if (btn) btn.addEventListener('click', () => {
          poiInfoWindow.close();
          openAddModal({ lat: e.latLng.lat(), lng: e.latLng.lng() });
        });
      });
    } else {
      openAddModal({ lat: e.latLng.lat(), lng: e.latLng.lng() });
    }
  });

  map.addListener('dragstart', () => { mapMoved = true; });
  map.addListener('idle', () => {
    if (mapMoved) { clearTimeout(areaTimer); areaTimer = setTimeout(showSearchAreaBtn, 600); }
  });

  if (google.maps.places) {
    const ac = new google.maps.places.Autocomplete(
      document.getElementById('f-place-search'),
      { fields: ['name', 'geometry'], language: 'ja' }
    );
    ac.bindTo('bounds', map);
    ac.addListener('place_changed', () => {
      const place = ac.getPlace();
      if (!place.geometry) return;
      if (place.name) document.getElementById('f-name').value = place.name;
      pendingLatLng = { lat: place.geometry.location.lat(), lng: place.geometry.location.lng() };
      document.getElementById('modal-coords').textContent =
        `${pendingLatLng.lat.toFixed(5)}, ${pendingLatLng.lng.toFixed(5)}`;
      if (place.geometry.viewport) map.fitBounds(place.geometry.viewport);
      else { map.panTo(place.geometry.location); map.setZoom(17); }
    });
  }

  startFirestore();
  goToCurrentLocation();
  setSheetSnap('peek', false);
};

// ============================================================

// ============================================================
const splashStart = Date.now();
setTimeout(() => hideSplash(), 6000);

function hideSplash() {
  const splash = document.getElementById('splash');
  if (!splash || splash.classList.contains('hidden')) return;
  const wait = Math.max(0, 2000 - (Date.now() - splashStart));
  setTimeout(() => {
    splash.classList.add('hidden');
    setTimeout(() => splash.remove(), 700);
  }, wait);
}

function startFirestore() {
  setTimeout(hideSplash, 5000);
  if (!toiletsRef) {
    setSyncStatus('offline');
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('empty-state').style.display = 'flex';
    showToast('Firebase未接続');
    hideSplash();
    return;
  }
  setSyncStatus('loading');
  toiletsRef.orderBy('addedAt', 'desc').onSnapshot(
    snap => {
      toilets = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      setSyncStatus('online');
      document.getElementById('loading-state').style.display = 'none';
      refreshAll();
      hideSplash();
    },
    err => {
      setSyncStatus('offline');
      showToast('接続エラー: ' + err.message);
      hideSplash();
    }
  );
}

function setSyncStatus(s) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  const colors = { online: '#34a853', loading: '#f4b400', offline: '#ea4335' };
  const labels = { online: '同期済み', loading: '同期中...', offline: 'オフライン' };
  dot.style.background = colors[s];
  dot.style.animation = s === 'loading' ? 'pulse 1s infinite' : '';
  lbl.textContent = labels[s];
}

function getFiltered() {
  return toilets.filter(t => {
    if (filterType !== 'all' && t.type !== filterType) return false;
    if (filterRating > 0 && (t.rating || 0) < filterRating) return false;
    for (const a of filterAmenities) { if (!t[a]) return false; }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      if (!(t.name||'').toLowerCase().includes(q) && !(t.notes||'').toLowerCase().includes(q)) return false;
    }
    if (searchBounds && !searchBounds.contains({ lat: t.lat, lng: t.lng })) return false;
    return true;
  });
}

function setTypeFilter(el, type) {
  filterType = type; filterRating = 0;
  document.querySelectorAll('#filter-chips .chip[onclick^="setTypeFilter"]').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('#filter-chips .chip[onclick^="setRatingFilter"]').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); searchBounds = null; refreshAll();
}
function setRatingFilter(el, rating) {
  const was = el.classList.contains('active');
  document.querySelectorAll('#filter-chips .chip[onclick^="setRatingFilter"]').forEach(b => b.classList.remove('active'));
  filterRating = was ? 0 : rating;
  if (!was) el.classList.add('active');
  searchBounds = null; refreshAll();
}
function toggleAmenityFilter(el, key) {
  filterAmenities.has(key) ? (filterAmenities.delete(key), el.classList.remove('active')) : (filterAmenities.add(key), el.classList.add('active'));
  searchBounds = null; refreshAll();
}
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  document.getElementById('clear-search').classList.toggle('show', !!searchQuery);
  searchBounds = null; refreshAll();
});
function clearSearch() {
  document.getElementById('search-input').value = ''; searchQuery = '';
  document.getElementById('clear-search').classList.remove('show'); refreshAll();
}
function showSearchAreaBtn() { document.getElementById('search-area-btn').classList.add('show'); }
function hideSearchAreaBtn() { mapMoved = false; document.getElementById('search-area-btn').classList.remove('show'); }
function searchInArea() { searchBounds = map.getBounds(); hideSearchAreaBtn(); refreshAll(); }

// マーカー & カード

function refreshAll() { renderMarkers(); renderCards(); }

function makeIcon(type, selected) {
  const color = TYPE_COLORS[type] || '#1a73e8';
  const scale = selected ? 1.3 : 1;
  const w = Math.round(54 * scale), h = Math.round(28 * scale);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}">
    <rect rx="${h/2}" width="${w}" height="${h}" fill="${color}" stroke="white" stroke-width="${selected ? 3 : 2}"/>
    <text x="${w/2}" y="${Math.round(h*0.72)}" text-anchor="middle" font-size="${Math.round(13*scale)}" fill="white" font-family="-apple-system,Helvetica,sans-serif" font-weight="bold">WC</text>
  </svg>`;
  return {
    url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
    scaledSize: new google.maps.Size(w, h),
    anchor: new google.maps.Point(w / 2, h),
  };
}

function renderMarkers() {
  if (!map) return;
  Object.values(markersMap).forEach(m => m.setMap(null));
  markersMap = {};
  getFiltered().forEach(t => {
    const marker = new google.maps.Marker({
      position: { lat: t.lat, lng: t.lng },
      map,
      icon: makeIcon(t.type, t.id === selectedId),
      title: t.name,
      zIndex: t.id === selectedId ? 100 : 1,
    });
    marker.addListener('click', () => selectToilet(t.id));
    markersMap[t.id] = marker;
  });
}

function renderCards() {
  const list    = document.getElementById('sheet-list');
  const empty   = document.getElementById('empty-state');
  const filtered = getFiltered();
  document.getElementById('sheet-count-num').textContent = filtered.length;
  Array.from(list.children).forEach(c => { if (!['empty-state','loading-state'].includes(c.id)) c.remove(); });
  if (filtered.length === 0) { empty.style.display = 'flex'; return; }
  empty.style.display = 'none';
  filtered.forEach(t => list.appendChild(buildCard(t)));
}

function buildCard(t) {
  const color   = TYPE_COLORS[t.type] || '#1a73e8';
  const bgColor = TYPE_BG[t.type] || '#e8f0fe';
  const stars   = t.rating
    ? '★'.repeat(t.rating) + `<span style="color:#ddd">${'★'.repeat(5-t.rating)}</span>`
    : '<span class="nr">未評価</span>';
  const amenities = [t.washlet&&'ウォシュレット', t.accessible&&'♿ 車椅子対応', t.babyChange&&'おむつ替え', t.h24&&'24時間', t.paid&&'有料'].filter(Boolean);
  const isFav = userProfile?.favoriteIds?.includes(t.id) || false;
  const canEdit = currentUser && (currentUser.uid === t.createdBy || userProfile?.isAdmin);

  const div = document.createElement('div');
  div.className = 'toilet-card' + (t.id === selectedId ? ' selected' : '');
  div.dataset.id = t.id;
  div.innerHTML = `
    <div class="card-icon" style="background:${bgColor};font-size:0.7rem;font-weight:900;color:${color}">WC</div>
    <div class="card-body">
      <div class="card-name">${esc(t.name)}</div>
      ${t.createdByName ? `<div class="card-by">by ${esc(t.createdByName)}</div>` : ''}
      <div class="card-meta">
        <span class="type-badge" style="background:${color}">${esc(t.type)}</span>
        <span class="card-rating">${stars}</span>
      </div>
      ${t.access && t.access !== '誰でも利用可' ? `<div style="margin-top:4px"><span class="amenity-tag" style="background:#fff3e0;color:#e37400">${esc(t.access)}</span></div>` : ''}
      ${amenities.length ? `<div class="card-amenities">${amenities.map(a=>`<span class="amenity-tag">${a}</span>`).join('')}</div>` : ''}
      ${t.notes ? `<div class="card-notes">${esc(t.notes)}</div>` : ''}
      <div class="card-action-row">
        <button class="card-fav-btn ${isFav ? 'favorited' : ''}" data-id="${t.id}" onclick="toggleFavorite('${t.id}',event)">${isFav ? '&#10084;' : '&#9825;'}</button>
        <button class="card-comment-btn" onclick="openComments('${t.id}',event)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          コメント
        </button>
      </div>
    </div>
    <button class="card-report-btn" onclick="reportToilet('${t.id}',event)" title="通報">通報</button>
    ${canEdit ? `<button class="card-edit-btn" onclick="event.stopPropagation();openEditModal('${t.id}')">編集</button>` : ''}`;

  div.addEventListener('click', () => {
    selectToilet(t.id);
    map.panTo({ lat: t.lat, lng: t.lng });
    if (map.getZoom() < 16) map.setZoom(16);
    setSheetSnap('peek');
  });
  return div;
}

function selectToilet(id) {
  selectedId = id;
  getFiltered().forEach(t => {
    const m = markersMap[t.id];
    if (!m) return;
    m.setIcon(makeIcon(t.type, t.id === id));
    m.setZIndex(t.id === id ? 100 : 1);
  });
  document.querySelectorAll('.toilet-card').forEach(c => c.classList.toggle('selected', c.dataset.id === id));
  const card = document.querySelector(`.toilet-card[data-id="${id}"]`);
  if (card) {
    if (currentSnap === 'peek') setSheetSnap('half');
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 350);
  }
}

// ============================================================
// ボトムシート ドラッグ
// ============================================================
const sheet       = document.getElementById('bottom-sheet');
const sheetHeader = document.getElementById('sheet-header');
let dragStartY = 0, dragStartT = 0, isDragging = false, currentSnap = 'peek';

function getTranslateY(el) { return new DOMMatrix(getComputedStyle(el).transform).m42; }

function setSheetSnap(snap, animate = true) {
  currentSnap = snap;
  if (!animate) sheet.classList.add('no-tr');
  sheet.classList.remove('snap-peek','snap-half','snap-full');
  sheet.classList.add('snap-' + snap);
  if (!animate) requestAnimationFrame(() => sheet.classList.remove('no-tr'));
  const h = { peek: 110, half: window.innerHeight*0.5, full: window.innerHeight*0.88 };
  document.getElementById('fab-group').style.bottom = (h[snap] + NAV_HEIGHT + 16) + 'px';
}

function onDS(e) { dragStartY=(e.touches?.[0]||e).clientY; dragStartT=getTranslateY(sheet); isDragging=true; sheet.classList.add('no-tr'); }
function onDM(e) {
  if (!isDragging) return; e.preventDefault();
  const dy=(e.touches?.[0]||e).clientY-dragStartY;
  const t=Math.max(Math.min(dragStartT+dy, window.innerHeight-110), window.innerHeight*0.06);
  sheet.style.transform=`translateY(${t}px)`;
}
function onDE(e) {
  if (!isDragging) return; isDragging=false; sheet.classList.remove('no-tr'); sheet.style.transform='';
  const dy=(e.changedTouches?.[0]||e).clientY-dragStartY;
  if (dy<-60) setSheetSnap(currentSnap==='peek'?'half':'full');
  else if (dy>60) setSheetSnap(currentSnap==='full'?'half':'peek');
  else setSheetSnap(currentSnap);
}

sheetHeader.addEventListener('touchstart', onDS, {passive:false});
sheetHeader.addEventListener('touchmove',  onDM, {passive:false});
sheetHeader.addEventListener('touchend',   onDE);
sheetHeader.addEventListener('mousedown',  onDS);
window.addEventListener('mousemove', onDM);
window.addEventListener('mouseup',   onDE);
sheetHeader.addEventListener('click', () => { if (Math.abs(getTranslateY(sheet)-dragStartT)<5 && currentSnap==='peek') setSheetSnap('half'); });

}

function openEditModal(id) {
  const t = toilets.find(x => x.id===id); if (!t) return;
  // Permission check
  if (currentUser && (currentUser.uid !== t.createdBy && !userProfile?.isAdmin)) {
    showToast('編集権限がありません');
    return;
  }
  editingId = id; pendingLatLng = { lat: t.lat, lng: t.lng };
  document.getElementById('modal-title').textContent = 'トイレを編集';
  document.getElementById('btn-delete').style.display = 'block';
  document.getElementById('modal-coords').textContent = `${t.lat.toFixed(5)}, ${t.lng.toFixed(5)}`;
  document.getElementById('f-name').value = t.name||'';
  document.getElementById('f-type').value = t.type||'男女共用';
  document.getElementById('f-access').value = t.access||'誰でも利用可';
  document.querySelectorAll('input[name="f-rating"]').forEach(r=>r.checked=false);
  if (t.rating) { const rb=document.querySelector(`input[name="f-rating"][value="${t.rating}"]`); if(rb)rb.checked=true; }
  document.getElementById('f-washlet').checked=!!t.washlet;
  document.getElementById('f-accessible').checked=!!t.accessible;
  document.getElementById('f-babyChange').checked=!!t.babyChange;
  document.getElementById('f-24h').checked=!!t.h24;
  document.getElementById('f-paid').checked=!!t.paid;
  document.getElementById('f-notes').value=t.notes||'';
  document.getElementById('toilet-modal').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(), 150);
}

function closeModal() { document.getElementById('toilet-modal').classList.remove('open'); editingId=null; pendingLatLng=null; }

function clearForm() {
  document.getElementById('f-place-search').value='';
  document.getElementById('f-name').value=''; document.getElementById('f-type').value='男女共用';
  document.getElementById('f-access').value='誰でも利用可';
  document.querySelectorAll('input[name="f-rating"]').forEach(r=>r.checked=false);
  ['f-washlet','f-accessible','f-babyChange','f-24h','f-paid'].forEach(id=>document.getElementById(id).checked=false);
  document.getElementById('f-notes').value='';
}

async function saveToilet() {
  if (!currentUser) { showToast('ログインが必要です'); return; }
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('名前を入力してください'); document.getElementById('f-name').focus(); return; }
  if (!pendingLatLng) { showToast('地図をタップして場所を選んでください'); closeModal(); return; }
  if (!toiletsRef) { showToast('Firebase未接続: 保存できません'); return; }

  const notes = document.getElementById('f-notes').value.trim();
  if (containsBadWord(name) || containsBadWord(notes)) {
    showToast('不適切な言葉が含まれています。内容を修正してください');
    return;
  }
  if (!editingId && !checkRateLimit()) {
    showToast('短時間に投稿が多すぎます。しばらく待ってから再試行してください');
    return;
  }

  const ratingEl = document.querySelector('input[name="f-rating"]:checked');
  const data = {
    name, type: document.getElementById('f-type').value,
    access: document.getElementById('f-access').value,
    rating: ratingEl ? parseInt(ratingEl.value) : 0,
    washlet: document.getElementById('f-washlet').checked,
    accessible: document.getElementById('f-accessible').checked,
    babyChange: document.getElementById('f-babyChange').checked,
    h24: document.getElementById('f-24h').checked,
    paid: document.getElementById('f-paid').checked,
    notes: document.getElementById('f-notes').value.trim(),
    lat: pendingLatLng.lat, lng: pendingLatLng.lng,
  };

  const btn = document.querySelector('#toilet-modal .btn-primary');
  btn.textContent='保存中...'; btn.disabled=true;
  try {
    if (editingId) {
      await toiletsRef.doc(editingId).update({ ...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      showToast('更新しました');
    } else {
      // Add creator info
      data.createdBy = currentUser.uid;
      data.createdByName = userProfile?.username || '名無し';
      data.addedAt = firebase.firestore.FieldValue.serverTimestamp();
      const doc = await toiletsRef.add(data);
      selectedId = doc.id; setSheetSnap('half');
      // Increment user points
      if (db) {
        await db.collection('users').doc(currentUser.uid).update({
          points: firebase.firestore.FieldValue.increment(1)
        });
        if (userProfile) userProfile.points = (userProfile.points || 0) + 1;
      }
      showToast('追加しました');
    }
    closeModal(); searchBounds=null;
  } catch(e) { showToast('保存失敗: '+e.message); }
  finally { btn.textContent='保存'; btn.disabled=false; }
}

async function deleteToilet() {
  const t = toilets.find(x => x.id === editingId);
  if (!editingId || !confirm('このトイレを削除しますか？')) return;
  // Permission check
  if (currentUser && t && currentUser.uid !== t.createdBy && !userProfile?.isAdmin) {
    showToast('削除権限がありません'); return;
  }
  try {
    await toiletsRef.doc(editingId).delete();
    // Decrement points if creator
    if (t && t.createdBy && db) {
      await db.collection('users').doc(t.createdBy).update({
        points: firebase.firestore.FieldValue.increment(-1)
      });
      if (currentUser && currentUser.uid === t.createdBy && userProfile) {
        userProfile.points = Math.max(0, (userProfile.points || 0) - 1);
      }
    }
    if (selectedId===editingId) selectedId=null;
    closeModal(); showToast('削除しました');
  } catch(e) { showToast('削除失敗: '+e.message); }
}

// ============================================================
// 現在地
// ============================================================
async function goToCurrentLocation() {
  try {
    let pos;
    if (window.isNative&&window.Capacitor) {
      const { Geolocation } = window.Capacitor.Plugins;
      const perm = await Geolocation.requestPermissions();
      if (perm.location==='denied') { showToast('位置情報の権限が必要です'); return; }
      pos = (await Geolocation.getCurrentPosition({enableHighAccuracy:true})).coords;
    } else {
      pos = await new Promise((res,rej)=>{ if(!navigator.geolocation){rej();return;} navigator.geolocation.getCurrentPosition(r=>res(r.coords),rej); });
    }
    if (map) map.panTo({ lat: pos.latitude, lng: pos.longitude });
    if (map && map.getZoom() < 15) map.setZoom(16);
    showToast('現在地に移動しました');
  } catch { showToast('位置情報を取得できませんでした'); }
}

// ============================================================
// ユーティリティ
// ============================================================
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function formatTime(date) {
  const now = new Date();
  const diff = Math.floor((now - date) / 1000);
  if (diff < 60) return 'たった今';
  if (diff < 3600) return Math.floor(diff / 60) + '分前';
  if (diff < 86400) return Math.floor(diff / 3600) + '時間前';
  return date.getFullYear() + '/' + (date.getMonth()+1) + '/' + date.getDate();
}

let toastTimer;
function showToast(msg) {
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}
